name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python 编译检查
        run: python -m compileall src scripts test

      - name: Python 测试
        run: python -m pytest test/test_data_sync.py test/test_data_validation.py -q

  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 安装依赖
        run: npm install

      - name: 前端类型检查
        run: npm run typecheck --workspace @ppll-chinese-a/web

      - name: 前端构建
        run: npm run build:web

  server-checks:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 安装依赖
        run: npm install

      - name: 后端类型检查
        run: npm run typecheck --workspace @ppll-chinese-a/server

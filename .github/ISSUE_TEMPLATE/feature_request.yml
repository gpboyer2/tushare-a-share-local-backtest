name: 功能建议
description: 提交一个新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你要解决的问题
      description: 先说问题，不要一上来只说方案
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你建议的方案
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 你认为会影响哪些模块

  - type: textarea
    id: extra
    attributes:
      label: 其他信息
